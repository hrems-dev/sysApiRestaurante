<div class="page-header">
  <h2><i class="fa-solid fa-folder-tree"></i> Categorías</h2>
  <button class="btn btn-primary" (click)="openNuevo()"><i class="fa-solid fa-plus"></i> Nueva Categoría</button>
</div>

<app-modal [open]="showModal" (close)="showModal = false" [title]="editId ? 'Editar Categoría' : 'Nueva Categoría'">
  <div class="modal-form">
    <div class="form-group">
      <label>Nombre</label>
      <input [(ngModel)]="form.nombreCategoria" placeholder="Ej: Bebidas" />
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <input [(ngModel)]="form.descripcionCategoria" placeholder="Descripción opcional" />
    </div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-primary" (click)="save()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
    <button class="btn btn-secondary" (click)="showModal = false">Cancelar</button>
  </div>
</app-modal>

<table>
  <thead><tr><th>Nombre</th><th>Descripción</th><th>Estado</th><th>Acciones</th></tr></thead>
  <tbody>
    @for (item of items; track item.idCategoria) {
      <tr>
        <td>{{ item.nombreCategoria }}</td>
        <td>{{ item.descripcionCategoria }}</td>
        <td><span class="badge" [class.active]="item.estadoCategoria" [class.inactive]="!item.estadoCategoria">{{ item.estadoCategoria ? 'Activo' : 'Inactivo' }}</span></td>
        <td class="actions-cell">
          <button class="btn-icon" (click)="editar(item)" title="Editar"><i class="fa-solid fa-pen"></i></button>
          <button class="btn-icon" (click)="delete(item.idCategoria)" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>
    }
  </tbody>
</table>
