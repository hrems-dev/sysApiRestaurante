<div class="page-header">
  <h2>Mesas</h2>
  <button class="btn btn-primary" (click)="openNuevo()">
    <i class="fa-solid fa-plus"></i> Nueva Mesa
  </button>
</div>

<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Lugar</th>
      <th>Capacidad</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    @for (item of items; track item.idMesa) {
      <tr>
        <td>{{ item.nombreMesa }}</td>
        <td>{{ item.lugar.nombreLugar }}</td>
        <td>{{ item.capacidad }}</td>
        <td>
          <span class="badge" [class.active]="item.estadoMesa" [class.inactive]="!item.estadoMesa">
            {{ item.estadoMesa ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td class="actions-cell">
          <button class="btn-icon" (click)="editar(item)" title="Editar"><i class="fa-solid fa-pen-to-square"></i></button>
          <button class="btn-icon btn-icon-danger" (click)="eliminar(item.idMesa)" title="Desactivar"><i class="fa-solid fa-trash-can"></i></button>
        </td>
      </tr>
    }
  </tbody>
</table>

<app-modal [open]="showModal" (close)="showModal = false" title="{{ editId ? 'Editar Mesa' : 'Nueva Mesa' }}">
  <div class="modal-form">
    <div class="form-group">
      <label>Nombre Mesa</label>
      <input [(ngModel)]="form.nombreMesa" placeholder="Ej: Mesa 1" />
    </div>
    <div class="form-group">
      <label>Lugar</label>
      <select [(ngModel)]="form.lugar" [compareWith]="compareLugar">
        <option [ngValue]="null" disabled>Seleccionar lugar</option>
        @for (l of lugares; track l.idLugar) {
          <option [ngValue]="{ idLugar: l.idLugar }">{{ l.nombreLugar }}</option>
        }
      </select>
    </div>
    <div class="form-group">
      <label>Capacidad</label>
      <input type="number" [(ngModel)]="form.capacidad" min="1" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" (click)="save()">Guardar</button>
      <button class="btn btn-secondary" (click)="showModal = false">Cancelar</button>
    </div>
  </div>
</app-modal>
